    <style>
:root {

* { box-sizing: border-box; }

html,

  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle, rgba(255,255,255,0.62) 0 2px, transparent 2.8px) 10px 14px / 34px 34px,
    radial-gradient(circle at 50% 0, rgba(255,255,255,0.74) 0 8px, transparent 8.8px) 0 0 / 26px 14px repeat-x,

}

    <script>
const STORAGE_KEY = "muyu-ai-adventure-state-v1";
const QWEN_DEFAULT_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";

const defaultState = {
  settings: {
    world: "",
    player: { name: "", gender: "", age: "", detail: "" },
    npcs: [],
    apiUrl: QWEN_DEFAULT_URL,
    apiKey: "",
    apiModel: "qwen-plus",
    apiModels: ["qwen-plus", "qwen3.5-plus", "qwen3-plus", "qwen-turbo", "qwen-max", "qwen-long"],
    settingDigest: ""
  },
  events: [],
  snapshots: [],
  selectedMemories: []
};

let state = loadState();
let editContext = null;
let pendingConfirm = null;
let memoryNotice = "";

const els = {
  chatLog: document.getElementById("chatLog"),
  inputForm: document.getElementById("inputForm"),
  playerInput: document.getElementById("playerInput"),
  directiveButton: document.getElementById("directiveButton"),
  directiveModal: document.getElementById("directiveModal"),
  directiveInput: document.getElementById("directiveInput"),
  directiveCancel: document.getElementById("directiveCancel"),
  directiveSend: document.getElementById("directiveSend"),
  drawerToggle: document.getElementById("drawerToggle"),
  sideDrawer: document.getElementById("sideDrawer"),
  sidebarPanelTitle: document.getElementById("sidebarPanelTitle"),
  statusModeButton: document.getElementById("statusModeButton"),
  relationModeButton: document.getElementById("relationModeButton"),
  statusList: document.getElementById("statusList"),
  relationList: document.getElementById("relationList"),
  memoryButton: document.getElementById("memoryButton"),
  homeButton: document.getElementById("homeButton"),
  fullscreenButton: document.getElementById("fullscreenButton"),
  memoryPage: document.getElementById("memoryPage"),
  homePage: document.getElementById("homePage"),
  memoryFilter: document.getElementById("memoryFilter"),
  memoryList: document.getElementById("memoryList"),
  mergeMemoryButton: document.getElementById("mergeMemoryButton"),
  worldSetting: document.getElementById("worldSetting"),
  playerName: document.getElementById("playerName"),
  playerGender: document.getElementById("playerGender"),
  playerAge: document.getElementById("playerAge"),
  playerDetail: document.getElementById("playerDetail"),
  apiUrl: document.getElementById("apiUrl"),
  apiKey: document.getElementById("apiKey"),
  apiModel: document.getElementById("apiModel"),
  modelOptions: document.getElementById("modelOptions"),
  saveWorldButton: document.getElementById("saveWorldButton"),
  saveCharacterButton: document.getElementById("saveCharacterButton"),
  saveApiButton: document.getElementById("saveApiButton"),
  qwenPresetButton: document.getElementById("qwenPresetButton"),
  fetchModelsButton: document.getElementById("fetchModelsButton"),
  testApiButton: document.getElementById("testApiButton"),
  apiStatus: document.getElementById("apiStatus"),
  addNpcButton: document.getElementById("addNpcButton"),
  npcList: document.getElementById("npcList"),
  saveHomeButton: document.getElementById("saveHomeButton"),
  resetButton: document.getElementById("resetButton"),
  confirmModal: document.getElementById("confirmModal"),
  resetCancel: document.getElementById("resetCancel"),
  resetConfirm: document.getElementById("resetConfirm"),
  actionConfirmModal: document.getElementById("actionConfirmModal"),
  actionConfirmTitle: document.getElementById("actionConfirmTitle"),
  actionConfirmText: document.getElementById("actionConfirmText"),
  actionConfirmCancel: document.getElementById("actionConfirmCancel"),
  actionConfirmOk: document.getElementById("actionConfirmOk"),
  editModal: document.getElementById("editModal"),
  editTitle: document.getElementById("editTitle"),
  editInput: document.getElementById("editInput"),
  editCancel: document.getElementById("editCancel"),
  editSave: document.getElementById("editSave")
};

function uid(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return saved ? migrateState({ ...clone(defaultState), ...saved }) : clone(defaultState);
  } catch {
    return clone(defaultState);
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function migrateState(next) {
  next.settings = { ...clone(defaultState.settings), ...(next.settings || {}) };
  if (typeof next.settings.player === "string") {
    next.settings.player = { name: "", gender: "", age: "", detail: next.settings.player };
  } else {
    next.settings.player = { name: "", gender: "", age: "", detail: "", ...(next.settings.player || {}) };
  }
  next.settings.npcs = Array.isArray(next.settings.npcs) ? next.settings.npcs : [];
  next.settings.apiModels = Array.isArray(next.settings.apiModels) ? next.settings.apiModels : [];
  if (!next.settings.apiUrl || !isQwenUrl(next.settings.apiUrl)) next.settings.apiUrl = QWEN_DEFAULT_URL;
  if (!next.settings.apiModel) next.settings.apiModel = "qwen-plus";
  next.settings.apiModels = [...new Set([...next.settings.apiModels, ...defaultState.settings.apiModels])];
  if (!next.settings.settingDigest) next.settings.settingDigest = buildSettingDigest(next.settings);
  next.events = Array.isArray(next.events) ? next.events : [];
  next.snapshots = Array.isArray(next.snapshots) ? next.snapshots : [];
  next.selectedMemories = Array.isArray(next.selectedMemories) ? next.selectedMemories : [];
  const originalLength = next.events.length;
  const hadMalformedStory = next.events.some((event) => isMalformedSavedStory(event?.story));
  next.events = next.events
    .filter((event) => !isLegacyLocalFallbackEvent(event) && !isStaleLoadingEvent(event))
    .map(repairSavedAiEvent);
  if (next.events.length !== originalLength || hadMalformedStory) {
    next.snapshots = [];
    next.selectedMemories = [];
  }
  return next;
}

function repairSavedAiEvent(event) {
  if (!event || event.type !== "ai" || event.status !== "done" || !isMalformedSavedStory(event.story)) return event;
  try {
    const raw = reconstructSavedStoryDump(event.story);
    const repaired = parseLooseStoryObject(raw);
    if (!repaired.blocks.length) return event;
    const previous = { ...buildInitialSnapshot(), env: event.story?.env || buildInitialSnapshot().env };
    const story = normalizeStory({
      ...repaired,
      env: {
        time: repaired.env.time || event.story?.env?.time,
        place: repaired.env.place || event.story?.env?.place,
        weather: repaired.env.weather || event.story?.env?.weather
      }
    }, previous, event.prompt || "", event.variant || 0, event.fixedEnv);
    return { ...event, story };
  } catch {
    return event;
  }
}

function isMalformedSavedStory(story) {
  const blocks = Array.isArray(story?.blocks) ? story.blocks : [];
  return blocks.some((block) => containsJsonFieldCode(block?.text) || containsJsonFieldCode(block?.speaker));
}

function reconstructSavedStoryDump(story) {
  return (story?.blocks || []).map((block) => {
    if (block.type === "dialogue") return `"${block.speaker || ""}":"${block.text || ""}"`;
    return block.text || "";
  }).join("\n");
}

function isStaleLoadingEvent(event) {
  return event?.type === "ai" && event.status === "loading";
}

function isLegacyLocalFallbackEvent(event) {
  if (!event || event.type !== "ai" || event.status === "loading") return false;
  const blocks = Array.isArray(event.story?.blocks) ? event.story.blocks : [];
  const text = blocks.map((block) => block?.text || "").join("\n");
  return [
    "新的行动信息进入场景后",
    "世界设定中的规则在暗处稳定地发挥作用",
    "没有替你做出任何决定",
    "一处不起眼的痕迹被",
    "主控推动了剧情："
  ].some((phrase) => text.includes(phrase));
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function latestSnapshot() {
  return state.snapshots[state.snapshots.length - 1] || buildInitialSnapshot();
}

function buildInitialSnapshot() {
  return {
    env: { time: "傍晚", place: "未命名的起点", weather: "微风" },
    statuses: [],
    relations: [],
    memories: { instant: [], long: [] },
    seed: 1
  };
}

function renderAll() {
  renderChat();
  renderSidebar();
  renderHome();
  renderMemoryPage();
  saveState();
}

function renderChat() {
  els.chatLog.innerHTML = "";
  if (!state.events.length) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "从底部输入第一句话开始冒险。AI 会保持三段式输出，并把人物状态、关系和记忆同步刷新。";
    els.chatLog.appendChild(empty);
    return;
  }

  state.events.filter((event) => event.type === "player" || event.type === "ai").forEach((event) => {
    const node = event.type === "player" ? renderPlayerMessage(event) : renderAiMessage(event);
    els.chatLog.appendChild(node);
  });
  requestAnimationFrame(() => {
    els.chatLog.scrollTop = els.chatLog.scrollHeight;
  });
}

function renderPlayerMessage(event) {
  const wrapper = document.createElement("article");
  wrapper.className = "message player";
  wrapper.dataset.id = event.id;
  wrapper.innerHTML = `
    <div class="player-bubble">
      <div class="player-text">${escapeHtml(event.text)}</div>
      <div class="button-row">
        <button class="message-action" data-action="delete-player" data-id="${event.id}" type="button">删除</button>
        <button class="message-action" data-action="edit-player" data-id="${event.id}" type="button">修改</button>
      </div>
    </div>
  `;
  return wrapper;
}

function renderAiMessage(event) {
  const wrapper = document.createElement("article");
  wrapper.className = "message ai";
  wrapper.dataset.id = event.id;
  const isLoading = event.status === "loading";
  const isError = event.status === "error";
  const story = event.story || {
    env: isError
      ? { time: "生成失败", place: "API 连接", weather: "错误" }
      : { time: "生成中", place: "剧情引擎", weather: "等待" },
    blocks: []
  };
  const storyHtml = isLoading
    ? `<p class="typing-indicator">${escapeHtml(event.streamText || "正在输入中……")}</p>`
    : isError
      ? `<p class="error-text">${escapeHtml(event.errorMessage || "生成失败，请检查 API 设置。")}</p>`
      : story.blocks
    .map((block) => {
      if (block.type === "dialogue") {
        return `
          <div class="dialogue-box">
            <span class="dialogue-speaker">对话方框 - ${escapeHtml(block.speaker)}</span>
            <div class="dialogue-text">"${escapeHtml(block.text)}"</div>
          </div>
        `;
      }
      return `<p>${escapeHtml(block.text)}</p>`;
    })
    .join("");

  wrapper.innerHTML = `
    <div class="ai-card">
      <div class="env-strip">
        <span>时间：${escapeHtml(story.env.time)}</span>
        <span>地点：${escapeHtml(story.env.place)}</span>
        <span>天气：${escapeHtml(story.env.weather)}</span>
      </div>
      <div class="story-body">${storyHtml}</div>
      <div class="button-row">
        <button class="message-action" data-action="delete-ai" data-id="${event.id}" type="button">删除</button>
        <button class="message-action" data-action="reroll-ai" data-id="${event.id}" type="button">重说</button>
        <button class="message-action" data-action="edit-ai" data-id="${event.id}" type="button">修改</button>
      </div>
    </div>
  `;
  return wrapper;
}

function renderSidebar() {
  const mode = state.sidebarMode || "status";
  els.sideDrawer.dataset.mode = mode;
  els.sidebarPanelTitle.textContent = mode === "status" ? "在场人物状态" : "已解锁人物关系";
  els.statusModeButton.classList.toggle("active", mode === "status");
  els.relationModeButton.classList.toggle("active", mode === "relation");
  els.statusList.classList.toggle("hidden", mode !== "status");
  els.relationList.classList.toggle("hidden", mode !== "relation");
  const current = getCurrentSidebarSnapshot();

  els.statusList.innerHTML = "";
  if (!current.statuses.length) {
    els.statusList.innerHTML = `<div class="character-card">暂无在场人物。添加主要 NPC 或开始剧情后会自动刷新。</div>`;
  } else {
    current.statuses.forEach((person) => {
      const card = document.createElement("article");
      card.className = "character-card";
      card.innerHTML = `
        <div>姓名：${escapeHtml(person.name)}</div>
        <div>年龄：${escapeHtml(person.age)}</div>
        <div>外形：${escapeHtml(person.appearance || "外形细节仍在当前光线里逐步清晰。")}</div>
        <div>体位（姿势）：${escapeHtml(person.posture || "停在便于观察局势的位置。")}</div>

      `;
      els.statusList.appendChild(card);

  }

  els.relationList.innerHTML = "";
  if (!current.relations.length) {
    els.relationList.innerHTML = `<div class="relation-card">暂无已解锁关系。</div>`;
  } else {

        <div>人物：${escapeHtml(rel.name)}</div>
        <div>关系：${escapeHtml(rel.description)}</div>
        <div>好感度：${escapeHtml(rel.affection)}</div>
      `;
      els.relationList.appendChild(card);
    });
  }
}

function renderMemoryPage() {
  const snap = latestSnapshot();
  const memories = [
    ...snap.memories.instant.map((memory) => ({ ...memory, type: "instant", label: "即时记忆" })),
    ...snap.memories.long.map((memory) => ({ ...memory, type: "long", label: "长期记忆" }))
  ].filter((memory) => els.memoryFilter.value === "all" || memory.type === els.memoryFilter.value);
  const validMemoryIds = new Set([
    ...snap.memories.instant.map((memory) => memory.id),
    ...snap.memories.long.map((memory) => memory.id)
  ]);

function ensureLongThought(text, name) {

}

async function submitPlayerText(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  const playerEvent = { id: uid("player"), type: "player", text: trimmed, createdAt: Date.now() };
  state.events.push(playerEvent);
  rebuildTimeline();
  renderAll();
  window.setTimeout(() => {
    const aiEvent = createPendingAiEvent({ source: "player", text: trimmed });
    state.events.push(aiEvent);
    rebuildTimeline();
    renderAll();
    scheduleAiResolution(aiEvent.id);
  }, 80);
}

async function submitDirective(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  const aiEvent = createPendingAiEvent({ source: "directive", text: trimmed });
  state.events.push(aiEvent);
  rebuildTimeline();
  renderAll();
  scheduleAiResolution(aiEvent.id);
}

function scheduleAiResolution(id) {
  window.setTimeout(() => {
    resolveAiEvent(id);
  }, 120);
}

function createPendingAiEvent({ source, text, variant = 0 }) {
  return {
    id: uid("ai"),
    type: "ai",
    source,
    prompt: text,
    variant,
    status: "loading",
    story: {
      env: { time: "生成中", place: "剧情引擎", weather: "等待" },
      blocks: [{ type: "paragraph", text: "正在输入中……" }]
    },
    createdAt: Date.now()
  };
}

async function resolveAiEvent(id) {
  const index = state.events.findIndex((event) => event.id === id);
  const event = state.events[index];
  if (!event || event.type !== "ai") return;
  const previous = index > 0 ? state.snapshots[index - 1] || buildInitialSnapshot() : buildInitialSnapshot();
  const loadingStartedAt = Date.now();
  try {
    let story = await generateStory({
        source: event.source,
        text: event.prompt || "",
        previous,
        variant: event.variant || 0,
        eventId: id,
        fixedEnv: event.fixedEnv
      });
    if (event.avoidText && isTooSimilarStory(storyToPlainText(story), event.avoidText)) {
      story = await generateStory({
          source: event.source,
          text: event.prompt || "",
          previous,
          variant: (event.variant || 0) + 101,
          eventId: id,
          fixedEnv: event.fixedEnv
        });
      if (isTooSimilarStory(storyToPlainText(story), event.avoidText)) {
        throw new Error("重说失败：模型返回内容与上一版过于相似，请再次点击重说或提高模型随机性。");
      }
    }
    await keepTypingVisible(loadingStartedAt);
    event.story = story;
    event.status = "done";
    delete event.errorMessage;
  } catch (error) {
    await keepTypingVisible(loadingStartedAt);
    event.status = "error";
    event.errorMessage = formatGenerationError(error);
    event.story = {
      env: event.fixedEnv || { time: "生成失败", place: "API 连接", weather: "错误" },
      blocks: [{ type: "paragraph", text: event.errorMessage }]
    };
  }
  rebuildTimeline();
  renderAll();
}

function keepTypingVisible(startedAt, minimum = 850) {
  const elapsed = Date.now() - startedAt;
  const rest = Math.max(0, minimum - elapsed);
  return new Promise((resolve) => window.setTimeout(resolve, rest));
}

async function generateStory({ source, text, previous, variant, eventId, fixedEnv }) {
  syncAllSettingsFromInputs();
  saveState();
  if (!state.settings.apiUrl || !state.settings.apiKey || !state.settings.apiModel) {
    throw new Error("请先在主页设置里填写 API URL、密钥和模型，并保存后再生成剧情。");
  }
  const event = state.events.find((item) => item.id === eventId);
  return await generateWithApi({ source, text, previous, variant, eventId, avoidText: event?.avoidText || "", fixedEnv });
}

function ensureApiReady() {
  syncAllSettingsFromInputs();
  saveState();
  if (!state.settings.apiUrl || !state.settings.apiKey || !state.settings.apiModel) {
    throw new Error("请先在主页设置里填写 API URL、密钥和模型，并保存后再使用该功能。");
  }
}

function compactForPrompt(value, limit = 1000) {
  const text = typeof value === "string" ? value : JSON.stringify(value || "");
  return text.length > limit ? `${text.slice(0, limit)}……` : text;
}

function buildGenerationSettingContext(includeOriginal) {
  const digest = state.settings.settingDigest || buildSettingDigest(state.settings);
  if (!includeOriginal) return `设定摘要（后续回合只读取摘要，避免重复长设定）：\n${digest}`;
  return [
    "开局第一回合必须完整读取以下全部设定原文；后续回合只读取摘要、上下文和记忆。",
    `设定摘要：\n${digest}`,
    `开局完整世界观设定原文：${state.settings.world || "未填写"}`,
    `开局完整主控设定原文：${formatPlayerProfileForPrompt()}`,
    `开局完整主要NPC设定原文：${JSON.stringify(state.settings.npcs || [])}`
  ].join("\n");
}

function buildStorySystemPrompt({ previous, source, variant, avoidText, fixedEnv, settingContext }) {
  const rerollRules = fixedEnv
    ? [
      `本次是重说。重说固定环境：${JSON.stringify(fixedEnv)}。env.time、env.place、env.weather 必须原样返回，只重写 blocks、statuses、relations、memory。`,
      "重说必须明显不同：更换剧情细节、NPC 动作、主要台词措辞和推进方向；禁止复刻上一版。"
    ]
    : [
      "如果是重说或变体生成，必须明显不同，不能只换同义词。"
    ];
  return [
    "你是 MUYU 风格 AI 文字冒险引擎，只返回严格 JSON，禁止 Markdown、代码块、解释、思考过程、政策说明或 JSON 外文字。",
    "JSON 结构固定：{env:{time,place,weather},blocks:[{type:'paragraph',text}或{type:'dialogue',speaker,text}],statuses:[{name,age,appearance,posture,thought,impression}],relations:[{name,description,affection}],memory:'一句话即时记忆'}。",
    "剧情正文只写在 blocks。statuses、relations、memory 只写进对应字段，绝对不能混入 blocks 正文。",
    fixedEnv ? "本回合是重说，env 必须沿用原时间、地点、天气。" : "env 必须根据本回合当前剧情实时生成 time、place、weather；如果剧情发生地点、时间段、天气感受或场景氛围变化，必须同步更新，禁止机械复用上一回合环境。",
    "绝对禁止代替玩家角色说话、行动、思考、选择或做决定；正文称呼主控必须用第二人称。",
    "paragraph 是自然段，不能写时间地点天气信息条，不能混入引号台词；dialogue 只能放一个角色真正说出口的话，禁止动作、心理、旁白进入 dialogue.text。",
    "statuses 只包含当前在场人物，每回合全新撰写，禁止照抄上一回合。appearance 写即时外形衣着神态；posture 写动作姿势站位；thought 写该角色第一人称心理OS，至少30中文字符；impression 写此刻对“你”的看法。",
    "memory 只用一句中文概括本回合核心：玩家输入、剧情推进、NPC关键反应；禁止复述完整台词。",
    "世界设定是最高规则；主要NPC出场时参考人设自然演化，不机械复述设定，不跑题，不暴露生成逻辑。",
    "未成年角色只允许全年龄日常、悬疑、友情、紧张对峙或普通情绪互动，禁止成人化与露骨方向。",
    ...rerollRules,
    settingContext,
    `当前环境：${compactForPrompt(previous.env, fixedEnv ? 180 : 280)}`,
    `当前记忆摘要：${compactForPrompt(previous.memories, fixedEnv ? 420 : 700)}`,
    `上一回合人物状态，必须避开完全相同表述：${compactForPrompt(previous.statuses || [], fixedEnv ? 420 : 700)}`,
    `生成模式：${source === "directive" ? "剧情发展指令扩写，不写玩家反应" : "回应玩家输入，不越权操控玩家"}`,
    `差异种子：${variant}`,
    avoidText ? `上一版摘要，重说必须避开：${compactForPrompt(avoidText, 520)}` : ""
  ].filter(Boolean).join("\n");
}

function buildChatRequestBody({ messages, variant, fastJson = true }) {
  const body = {
    model: state.settings.apiModel,
    messages,
    temperature: variant ? 0.92 : 0.68,
    presence_penalty: variant ? 0.65 : 0.1,
    frequency_penalty: variant ? 0.45 : 0.05,
    max_tokens: variant ? 1050 : 1150,
    stream: false
  };
  if (fastJson && isQwenUrl(state.settings.apiUrl)) {
    body.enable_thinking = false;
    body.extra_body = { enable_thinking: false };
  }
  return body;
}

function stripProviderHints(body) {
  const next = { ...body };
  delete next.enable_thinking;
  delete next.extra_body;
  delete next.response_format;
  return next;
}

async function postChatCompletion(requestBody, eventId) {
  const doFetch = async (body) => {
    const response = await fetchWithTimeout(state.settings.apiUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${state.settings.apiKey}`
      },
      body: JSON.stringify(body)
    }, getApiTimeout());
    if (!response.ok) await throwApiHttpError(response);
    return await readApiResponsePayload(response, eventId);
  };
  try {
    return await doFetch(requestBody);
  } catch (error) {
    const message = String(error?.message || error || "");
    const canRetry = /400|Bad Request|unsupported|unknown|enable_thinking|extra_body|parameter|参数/i.test(message)
      && (requestBody.enable_thinking !== undefined || requestBody.extra_body !== undefined);
    if (!canRetry) throw error;
    updateStreamingText(eventId, "接口不接受低延迟参数，正在自动换成兼容请求……");
    return await doFetch(stripProviderHints(requestBody));
  }
}

async function readApiResponsePayload(response, eventId) {
  const contentType = response.headers?.get?.("content-type") || "";
  if (/text\/event-stream|stream/i.test(contentType) && response.body?.getReader) {
    const content = await readOpenAiStream(response, eventId);
    return { choices: [{ message: { content } }] };
  }
  if (typeof response.json === "function") {
    try {
      return await response.json();
    } catch {
      // Fall through to text parsing for providers that mislabel JSON.
    }
  }
  if (typeof response.text === "function") {
    const text = await response.text();
    try {
      return JSON.parse(text);
    } catch {
      return { choices: [{ message: { content: text } }] };
    }
  }
  return {};
}

async function generateWithApi({ source, text, previous, variant, eventId, avoidText = "", fixedEnv }) {
  const isOpeningContext = state.events.filter((event) => event.type === "ai" && event.status === "done").length === 0;
  const settingContext = buildGenerationSettingContext(isOpeningContext);
  const systemPrompt = buildStorySystemPrompt({ previous, source, variant, avoidText, fixedEnv, settingContext });

  const messages = [
    { role: "system", content: systemPrompt },
    { role: "user", content: text }
  ];
  const requestBody = buildChatRequestBody({ messages, variant, fastJson: true });

  updateStreamingText(eventId, fixedEnv ? "正在重新生成本回合剧情……" : "正在请求剧情……");
  const data = await postChatCompletion(requestBody, eventId);
  let content = extractResponseMessage(data);
  updateStreamingText(eventId, makeStreamingPreview(content) || "正在整理剧情格式……");
  if (!String(content || "").trim()) {
    throw new Error(`API 返回内容为空：完整请求没有返回可用正文。${describeApiEmptyResponse(data)}`);
  }
  if (isNonStoryModelOutput(content)) {
    throw new Error("模型返回了非剧情内容或安全说明，已阻止其进入聊天正文。请检查世界设定/角色年龄/输入内容，避免未成年角色的成人或露骨方向，然后重试。");
  }
  const parsed = parseApiJsonContent(content);
  return normalizeStory(parsed, previous, text, variant, fixedEnv);
}

async function retryWithoutStream(requestBody, eventId) {
  updateStreamingText(eventId, "流式返回为空，正在重新获取完整剧情……");
  const data = await postChatCompletion({ ...requestBody, stream: false }, eventId);
  const content = extractResponseMessage(data);
  updateStreamingText(eventId, makeStreamingPreview(content) || "正在整理剧情格式……");
  return content;
}

function extractResponseMessage(data) {
  return firstContentString(
    data?.choices?.[0]?.message?.content,
    data?.choices?.[0]?.message?.reasoning_content,
    data?.choices?.[0]?.message?.reasoning,
    data?.choices?.[0]?.delta?.content,
    data?.choices?.[0]?.text,
    data?.output_text,
    data?.output?.text,
    data?.output?.content,
    data?.output?.choices?.[0]?.message?.content,
    data?.response?.output_text,
    data?.response?.text,
    data?.response?.content,
    data?.result?.output_text,
    data?.result?.text,
    data?.result?.content,
    data?.message?.content,
    data?.content,
    data?.text
  );
}

function describeApiEmptyResponse(data) {
  const keys = collectApiKeys(data).slice(0, 18).join(", ") || "无可识别字段";
  const finish = data?.choices?.[0]?.finish_reason || data?.output?.finish_reason || data?.finish_reason || "";
  const code = data?.code || data?.error?.code || data?.status_code || "";
  const message = data?.message || data?.error?.message || data?.msg || "";
  return [
    `返回字段：${keys}。`,
    finish ? `finish_reason：${finish}。` : "",
    code ? `code：${code}。` : "",
    message ? `message：${String(message).slice(0, 160)}。` : ""
  ].filter(Boolean).join("");
}

function collectApiKeys(value, prefix = "", result = []) {
  if (!value || typeof value !== "object" || result.length > 30) return result;
  Object.keys(value).slice(0, 12).forEach((key) => {
    const path = prefix ? `${prefix}.${key}` : key;
    result.push(path);
    const child = value[key];
    if (child && typeof child === "object") {
      if (Array.isArray(child)) {
        if (child[0] && typeof child[0] === "object") collectApiKeys(child[0], `${path}[0]`, result);
      } else {
        collectApiKeys(child, path, result);
      }
    }
  });
  return result;
}

function firstContentString(...values) {
  for (const value of values) {
    const text = contentValueToString(value);
    if (text.trim()) return text;
  }
  return "";
}

function contentValueToString(value) {
  if (value == null) return "";
  if (typeof value === "string") return value;
  if (Array.isArray(value)) {
    return value.map((item) => contentValueToString(item)).filter(Boolean).join("");
  }
  if (typeof value === "object") {
    if (value.env || value.blocks || value.statuses || value.relations || value.memory) {
      return JSON.stringify(value);
    }
    return firstContentString(value.text, value.content, value.output_text, value.message?.content);
  }
  return String(value || "");
}

async function generateMergedMemoryWithApi(selected) {
  ensureApiReady();
  const memoryText = selected.map((item, index) => `${index + 1}. ${item.text}`).join("\n");
  const systemPrompt = [
    "你是文字冒险游戏的记忆整理器。",
    "任务：把玩家勾选的即时记忆或长期记忆提炼成一条新的长期记忆。",
    "禁止原文拼接，禁止逐条罗列，必须压缩核心事件、人物互动、NPC反应、关系变化和关键设定。",
    "只输出一段中文长期记忆正文，不要标题、编号、Markdown、解释或引号。",
    "这条记忆会永久影响后续剧情、NPC内心、对话和行为，所以必须保留会影响未来反应的事实。",
    buildGenerationSettingContext(false)
  ].join("\n");
  const response = await fetchWithTimeout(state.settings.apiUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${state.settings.apiKey}`
    },
    body: JSON.stringify({
      model: state.settings.apiModel,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: `请整合以下记忆：\n${memoryText}` }
      ],
      temperature: 0.35,
      presence_penalty: 0.1,
      frequency_penalty: 0.25,
      stream: false
    })
  }, getApiTimeout());
  if (!response.ok) await throwApiHttpError(response);
  const data = await response.json();
  const raw = extractResponseMessage(data);
  const clean = String(raw || "")
    .replace(/^```(?:text|markdown)?\s*/i, "")
    .replace(/\s*```$/i, "")
    .replace(/^(长期记忆|整合记忆)\s*[:：]\s*/i, "")
    .replace(/\s+/g, " ")
    .trim();
  if (!clean) throw new Error("API 没有返回可用的整合记忆。");
  return clean.length > 220 ? `${clean.slice(0, 220)}…` : clean;
}

async function readOpenAiStream(response, eventId) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buffer = "";
  let content = "";
  const handleLine = (line) => {
    const trimmed = line.trim();
    if (!trimmed.startsWith("data:")) return;
    const payload = trimmed.slice(5).trim();
    if (!payload || payload === "[DONE]") return;
    try {
      const json = JSON.parse(payload);
      const delta = extractStreamDelta(json);
      if (delta) {
        content += delta;
        updateStreamingText(eventId, makeStreamingPreview(content));
      }
    } catch {
      // Some providers send heartbeat lines or non-JSON keepalive chunks.
    }
  };
  while (true) {
    let chunk;
    try {
      chunk = await readStreamChunkWithTimeout(reader, 45000);
    } catch (error) {
      if (content.trim()) {
        try {
          await reader.cancel();
        } catch {
          // The stream may already be closed by the provider.
        }
        break;
      }
      throw error;
    }
    const { value, done } = chunk;
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split(/\r?\n/);
    buffer = lines.pop() || "";
    lines.forEach(handleLine);
  }
  if (buffer.trim()) handleLine(buffer);
  updateStreamingText(eventId, makeStreamingPreview(content) || "正在整理剧情格式……");
  return content;
}

function readStreamChunkWithTimeout(reader, timeout) {
  let timer = 0;
  return Promise.race([
    reader.read(),
    new Promise((_, reject) => {
      timer = window.setTimeout(() => reject(new Error("API 流式响应中断：长时间没有继续返回内容。")), timeout);
    })
  ]).finally(() => window.clearTimeout(timer));
}

function extractStreamDelta(json) {
  const choice = json?.choices?.[0] || json?.output?.choices?.[0] || {};
  return firstContentString(
    choice.delta?.content,
    choice.message?.content,
    json?.output_text,
    json?.output?.text,
    json?.output?.content,
    json?.message?.content,
    json?.content,
    json?.text
  );
}

function makeStreamingPreview(content) {
  const raw = String(content || "").trim();
  if (!raw) return "";
  if (isNonStoryModelOutput(raw)) return "模型返回非剧情说明，正在尝试重新获取剧情……";
  if (looksLikeIncompleteJson(raw)) return "正在输入中……";
  try {
    const parsed = parseApiJsonContent(raw);
    return storyBodyPlainText(parsed);
  } catch {
    const texts = [];
    raw.replace(/"speaker"\s*:\s*"([^"]*)"[\s\S]{0,80}?"text"\s*:\s*"([^"]*)"/g, (_, speaker, line) => {
      texts.push(`${unescapeJsonString(speaker)}：「${unescapeJsonString(line)}」`);
      return "";
    });
    raw.replace(/"type"\s*:\s*"paragraph"[\s\S]{0,80}?"text"\s*:\s*"([^"]*)"/g, (_, value) => {
      texts.push(unescapeJsonString(value));
      return "";
    });
    return texts
      .filter((item) => !/^(时间|地点|天气|鏃堕棿|鍦扮偣|澶╂皵)/.test(item))
      .join("\n\n") || (/^\s*[\[{]|"env"|"blocks"|"statuses"|"relations"|"memory"/.test(raw) ? "正在输入中……" : raw.replace(/[{}\[\]",]/g, " ").replace(/\s+/g, " ").trim());
  }
}

function looksLikeIncompleteJson(raw) {
  const text = String(raw || "").trim();
  if (!/^\s*[\[{]/.test(text) && !/"env"|"blocks"|"statuses"|"relations"|"memory"/.test(text)) return false;
  let depth = 0;
  let inString = false;
  let escaping = false;
  for (const char of text) {
    if (escaping) {
      escaping = false;
      continue;
    }
    if (char === "\\") {
      escaping = true;
      continue;
    }
    if (char === '"') {
      inString = !inString;
      continue;
    }
    if (inString) continue;
    if (char === "{" || char === "[") depth += 1;
    if (char === "}" || char === "]") depth -= 1;
  }
  return inString || depth > 0;
}

function storyToPlainText(story) {
  const parts = [];
  if (story?.env) {
    parts.push(`时间：${story.env.time || ""} 地点：${story.env.place || ""} 天气：${story.env.weather || ""}`.trim());
  }
  (story?.blocks || []).forEach((block) => {
    if (block.type === "dialogue") parts.push(`${block.speaker || "NPC"}：「${block.text || ""}」`);
    else if (block.text) parts.push(block.text);
  });
  return parts.filter(Boolean).join("\n\n");
}

function storyBodyPlainText(story) {
  const parts = [];
  (story?.blocks || []).forEach((block) => {
    if (block.type === "dialogue") parts.push(`${block.speaker || "NPC"}：“${block.text || ""}”`);
    else if (block.text) parts.push(block.text);
  });
  return parts.filter(Boolean).join("\n\n");
}

function collectDialogueBySpeaker(story) {
  const map = {};
  (story?.blocks || []).forEach((block) => {
    if (block.type !== "dialogue" || !block.speaker || !block.text) return;
    map[block.speaker] = [map[block.speaker], block.text].filter(Boolean).join(" ");
  });
  return map;
}

function isTooSimilarStory(nextText, previousText) {
  const a = normalizeCompareText(nextText);
  const b = normalizeCompareText(previousText);
  if (!a || !b) return false;
  if (a === b) return true;
  const short = a.length < b.length ? a : b;
  const long = a.length < b.length ? b : a;
  if (short.length > 80 && long.includes(short.slice(0, Math.min(short.length, 220)))) return true;
  const grams = new Set();
  for (let i = 0; i < short.length - 5; i += 3) grams.add(short.slice(i, i + 6));
  if (!grams.size) return false;
  let same = 0;
  grams.forEach((gram) => {
    if (long.includes(gram)) same += 1;
  });
  return same / grams.size > 0.72;
}

function normalizeCompareText(text) {
  return String(text || "")
    .replace(/[，。！？；：、“”"「」『』\s]/g, "")
    .replace(/时间.*?天气/g, "")
    .trim();
}

function unescapeJsonString(value) {
  try {
    return JSON.parse(`"${String(value).replace(/"/g, '\\"')}"`);
  } catch {
    return value;
  }
}

function updateStreamingText(eventId, text) {
  const event = state.events.find((item) => item.id === eventId);
  if (!event || event.status !== "loading") return;
  event.streamText = text || "正在输入中……";
  renderAll();
}

function parseApiJsonContent(content) {
  const raw = String(content || "").trim();
  if (!raw) throw new Error("API 返回内容为空。");
  if (isNonStoryModelOutput(raw)) {
    throw new Error("模型返回了非剧情内容或安全说明，不能作为剧情显示。");
  }
  const withoutFence = raw
    .replace(/^```(?:json)?\s*/i, "")
    .replace(/\s*```$/i, "")
    .trim();
  try {
    return unwrapApiStoryPayload(JSON.parse(withoutFence));
  } catch {
    const start = withoutFence.indexOf("{");
    const end = withoutFence.lastIndexOf("}");
    if (start >= 0 && end > start) {
      try {
        return unwrapApiStoryPayload(JSON.parse(withoutFence.slice(start, end + 1)));
      } catch {
        // Fall through to text repair below.
      }
    }
    const loose = parseLooseStoryObject(withoutFence);
    if (loose.blocks.length || loose.statuses.length || loose.relations.length || loose.memory) return loose;
    const repaired = parseTextResponseToStory(withoutFence);
    if (repaired.blocks.length) return repaired;
    throw new Error("API 返回内容不是可解析 JSON，请检查模型是否遵守输出格式。");
  }
}

function unwrapApiStoryPayload(payload) {
  if (!payload || typeof payload !== "object") return payload;
  const nestedText = extractResponseMessage(payload);
  if (nestedText) {
    return parseApiJsonContent(nestedText);
  }
  if (payload.story && typeof payload.story === "object") return payload.story;
  return payload;
}

function parseTextResponseToStory(text) {
  const clean = String(text || "")
    .replace(/^```(?:json|text|markdown)?\s*/i, "")
    .replace(/\s*```$/i, "")
    .trim();
  if (!clean) return { blocks: [] };
  if (isNonStoryModelOutput(clean)) return { blocks: [] };
  if (looksLikeJsonDump(clean)) return { blocks: [] };
  const lines = clean
    .split(/\n{2,}|\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean)
    .filter((line) => !/^[-—]*\s*(美化信息条|剧情正文|按钮栏)\s*[-—]*$/i.test(line))
    .filter((line) => !/^\[?\s*时间[：:].*地点[：:].*天气[：:]/.test(line))
    .filter((line) => !/^[-—]{2,}$/.test(line))
    .filter((line) => !/^\[?(删除|重说|修改)\]?/.test(line));
  const blocks = [];
  lines.forEach((line) => {
    const dialogueBox = line.match(/^\[?对话方框\s*-\s*(.+?)\]?\s*["“「『]?(.+?)["”」』]?$/);
    if (dialogueBox) {
      blocks.push({
        type: "dialogue",
        speaker: cleanSpeakerName(dialogueBox[1]) || dialogueBox[1].trim(),
        text: dialogueBox[2].trim()
      });
      return;
    }
    splitParagraphAndDialogue(line, "", 0).forEach((block) => blocks.push(block));
  });
  return { blocks };
}

function parseLooseStoryObject(text) {
  const raw = String(text || "").trim();
  const env = extractLooseEnv(raw);
  const blocks = extractLooseBlocks(raw);
  const statuses = extractLooseStatuses(raw);
  const relations = extractLooseRelations(raw);
  const memory = cleanMemorySummary(extractLooseStringField(extractLooseSection(raw, "memory", ""), "memory") || extractLooseStandaloneString(raw, "memory"));
  return { env, blocks, statuses, relations, memory };
}

function extractLooseEnv(raw) {
  const envSection = extractLooseSection(raw, "env", "blocks|statuses|relations|memory");
  return {
    time: extractLooseStringField(envSection, "time") || "",
    place: extractLooseStringField(envSection, "place") || "",
    weather: extractLooseStringField(envSection, "weather") || ""
  };
}

function extractLooseBlocks(raw) {
  const section = extractLooseSection(raw, "blocks", "statuses|relations|memory");
  const objects = extractLooseObjects(section);
  return objects.flatMap((objectText) => {
    const type = extractLooseStringField(objectText, "type");
    const text = extractLooseStringField(objectText, "text");
    if (!text || isJsonCodeText(text)) return [];
    if (type === "dialogue" || extractLooseStringField(objectText, "speaker")) {
      const speaker = extractLooseStringField(objectText, "speaker") || "NPC";
      const cleaned = cleanDialogueText(text);
      const result = [];
      if (cleaned.aside) result.push({ type: "paragraph", text: sanitizeNoPlayerControl(cleaned.aside) });
      if (cleaned.line) result.push({ type: "dialogue", speaker: cleanSpeakerName(speaker) || speaker, text: sanitizeNoPlayerControl(cleaned.line) });
      return result;
    }
    return splitParagraphAndDialogue(text, "", 0);
  });
}

function extractLooseStatuses(raw) {
  const section = extractLooseSection(raw, "statuses", "relations|memory");
  return extractLooseObjects(section).map((objectText) => ({
    name: cleanStatusText(extractLooseStringField(objectText, "name")),
    age: cleanStatusText(extractLooseStringField(objectText, "age")),
    appearance: cleanStatusText(extractLooseStringField(objectText, "appearance")),
    posture: cleanStatusText(extractLooseStringField(objectText, "posture")),
    thought: cleanThoughtText(extractLooseStringField(objectText, "thought")) || cleanStatusText(extractLooseStringField(objectText, "thought")),
    impression: cleanStatusText(extractLooseStringField(objectText, "impression"))
  })).filter((item) => item.name || item.appearance || item.thought);
}

function extractLooseRelations(raw) {
  const section = extractLooseSection(raw, "relations", "memory|statuses");
  return extractLooseObjects(section).map((objectText) => ({
    name: cleanStatusText(extractLooseStringField(objectText, "name")),
    description: cleanStatusText(extractLooseStringField(objectText, "description")),
    affection: Number(extractLooseNumberField(objectText, "affection"))
  })).filter((item) => item.name || item.description).map((item) => ({
    ...item,
    affection: Number.isFinite(item.affection) ? item.affection : 0
  }));
}

function extractLooseSection(raw, key, stopKeys) {
  const start = findLooseKeyIndex(raw, key);
  if (start < 0) return "";
  const afterKey = raw.slice(start).replace(new RegExp(`^["']?${key}["']?\\s*:\\s*`, "i"), "");
  if (!stopKeys) return afterKey;
  const stop = new RegExp(`[,}]\\s*["']?(?:${stopKeys})["']?\\s*:`, "i").exec(afterKey);
  return stop ? afterKey.slice(0, stop.index) : afterKey;
}

function findLooseKeyIndex(raw, key) {
  const match = new RegExp(`(?:^|[,{}\\s])["']?${key}["']?\\s*:`, "i").exec(raw);
  if (!match) return -1;
  return match.index + match[0].search(new RegExp(`["']?${key}["']?\\s*:`, "i"));
}

function extractLooseObjects(section) {
  const text = String(section || "");
  const objects = [];
  let depth = 0;
  let start = -1;
  let inString = false;
  let quote = "";
  let escaping = false;
  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    if (escaping) {
      escaping = false;
      continue;
    }
    if (char === "\\") {
      escaping = true;
      continue;
    }
    if ((char === '"' || char === "'") && (!inString || char === quote)) {
      inString = !inString;
      quote = inString ? char : "";
      continue;
    }
    if (inString) continue;
    if (char === "{") {
      if (depth === 0) start = i;
      depth += 1;
    } else if (char === "}") {
      depth -= 1;
      if (depth === 0 && start >= 0) {
        objects.push(text.slice(start, i + 1));
        start = -1;
      }
    }
  }
  return objects;
}

function extractLooseStringField(objectText, field) {
  const text = String(objectText || "");
  const key = new RegExp(`["']?${field}["']?\\s*:\\s*`, "i");
  const match = key.exec(text);
  if (!match) return "";
  let index = match.index + match[0].length;
  while (/\s/.test(text[index] || "")) index += 1;
  const quote = text[index];
  if (quote === '"' || quote === "'" || quote === "“" || quote === "「" || quote === "『") {
    const close = quote === "“" ? "”" : quote === "「" ? "」" : quote === "『" ? "』" : quote;
    index += 1;
    let result = "";
    let escaping = false;
    for (; index < text.length; index += 1) {
      const char = text[index];
      if (escaping) {
        result += char;
        escaping = false;
        continue;
      }
      if (char === "\\") {
        escaping = true;
        continue;
      }
      if (char === close) break;
      result += char;
    }
    return unescapeJsonString(result).trim();
  }
  const bare = text.slice(index).match(/^([^,}\]]+)/);
  return bare ? bare[1].trim() : "";
}

function extractLooseStandaloneString(raw, key) {
  const section = extractLooseSection(raw, key, "");
  const match = String(section || "").match(/^\s*["“「『]([\s\S]*?)["”」』]\s*[,}]?$/);
  return match ? match[1].trim() : "";
}

function extractLooseNumberField(objectText, field) {
  const match = new RegExp(`["']?${field}["']?\\s*:\\s*(-?\\d+(?:\\.\\d+)?)`, "i").exec(String(objectText || ""));
  return match ? match[1] : "";
}

function looksLikeJsonDump(text) {
  const raw = String(text || "").trim();
  return /^\s*[{[]/.test(raw) || containsJsonFieldCode(raw);
}

function isJsonCodeText(text) {
  return containsJsonFieldCode(text) || /[{}[\]]/.test(String(text || ""));
}

function containsJsonFieldCode(text) {
  return /["']?(env|blocks|statuses|relations|memory|type|text|speaker|appearance|posture|thought|impression|affection)["']?\s*:/.test(String(text || ""));
}

function isNonStoryModelOutput(text) {
  const raw = String(text || "").trim();
  if (!raw) return false;
  const lower = raw.toLowerCase();
  return /safety guidelines|csam|child safety|under 18|underage|minor characters|sexually explicit|legal requirements|policy|as an ai|i can't|i cannot|i’m sorry|i'm sorry|cannot comply|not able to assist|actually looking at safety/i.test(lower)
    && !/"blocks"\s*:|type\s*:\s*["']?(paragraph|dialogue)|"env"\s*:/.test(raw);
}

async function fetchWithTimeout(url, options = {}, timeout = 12000) {
  const controller = new AbortController();
  const timer = window.setTimeout(() => controller.abort(), timeout);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    window.clearTimeout(timer);
  }
}

async function throwApiHttpError(response) {
  let detail = "";
  try {
    const text = await response.text();
    if (text) {
      try {
        const json = JSON.parse(text);
        detail = json.error?.message || json.message || json.code || text.slice(0, 240);
      } catch {
        detail = text.slice(0, 240);
      }
    }
  } catch {
    detail = "";
  }
  throw new Error(`HTTP ${response.status}${detail ? `：${detail}` : ""}`);
}

function formatGenerationError(error) {
  if (error?.name === "AbortError") {
    return "生成失败：API 请求超过 45 秒没有完成。请先换 qwen-turbo 或 qwen-plus 测试，缩短世界设定/角色设定，确认模型没有卡在复杂长上下文里。";
  }
  const message = String(error?.message || error || "未知错误");
  if (/400|Bad Request/i.test(message)) return `生成失败：请求参数不被接口接受。请检查模型名是否正确，当前模型可以先试 qwen-plus。${message}`;
  if (/401|Unauthorized/i.test(message)) return "生成失败：密钥无效或没有权限，请检查千问 API Key。";
  if (/403|Forbidden/i.test(message)) return "生成失败：当前密钥没有访问该模型或工作空间的权限。";
  if (/404|Not Found/i.test(message)) return "生成失败：API 地址或模型名称不存在，请确认千问兼容地址和模型 ID。";
  if (/Failed to fetch|NetworkError|Load failed/i.test(message)) {
    return "生成失败：浏览器无法连接 API。常见原因是接口跨域限制、网络不可达或 API 地址填写错误。";
  }
  if (/JSON|解析|format|格式/i.test(message)) {
    return `生成失败：模型返回格式不符合剧情 JSON 结构。${message}`;
  }
  return `生成失败：${message}`;
}

function getApiTimeout() {
  const debugTimeout = new URLSearchParams(window.location.search).get("apiTimeout");
  const parsed = Number(debugTimeout);
  return Number.isFinite(parsed) && parsed >= 500 ? parsed : 45000;
}

function getStreamApiTimeout() {
  const debugTimeout = new URLSearchParams(window.location.search).get("streamApiTimeout");
  const parsed = Number(debugTimeout);
  return Number.isFinite(parsed) && parsed >= 500 ? parsed : Math.min(getApiTimeout(), 30000);
}

function getQuickApiTimeout() {
  const debugTimeout = new URLSearchParams(window.location.search).get("quickApiTimeout");
  const parsed = Number(debugTimeout);
  return Number.isFinite(parsed) && parsed >= 500 ? parsed : 30000;
}

const QWEN_MODEL_CANDIDATES = [
  "qwen-plus",
  "qwen3.5-flash",
  "qwen3.5-plus",
  "qwen3-plus",
  "qwen-turbo",
  "qwen-max",
  "qwen-long"
];

function isQwenUrl(apiUrl) {
  return /aliyuncs\.com|dashscope|compatible-mode/i.test(apiUrl || "");
}

function normalizeApiUrl(apiUrl) {
  const trimmed = String(apiUrl || "").trim();
  if (!trimmed) return "";
  const withoutTrailing = trimmed.replace(/\/+$/, "");
  if (/\/chat\/completions$|\/responses$|\/models$/i.test(withoutTrailing)) {
    return withoutTrailing.replace(/\/models$/i, "/chat/completions");
  }
  if (/\/compatible-mode\/v1$/i.test(withoutTrailing) || /\/v1$/i.test(withoutTrailing)) {
    return `${withoutTrailing}/chat/completions`;
  }
  if (/aliyuncs\.com|dashscope/i.test(withoutTrailing)) {
    return `${withoutTrailing}/compatible-mode/v1/chat/completions`;
  }
  return `${withoutTrailing}/chat/completions`;
}

function getModelsUrl(apiUrl) {
  const trimmed = normalizeApiUrl(apiUrl);
  if (!trimmed) return "";
  try {
    const url = new URL(trimmed);
    url.pathname = url.pathname
      .replace(/\/chat\/completions\/?$/, "/models")
      .replace(/\/responses\/?$/, "/models");
    if (!/\/models\/?$/.test(url.pathname)) {
      url.pathname = url.pathname.replace(/\/$/, "") + "/models";
    }
    url.search = "";
    return url.toString();
  } catch {
    return trimmed.replace(/\/chat\/completions\/?$/, "/models").replace(/\/responses\/?$/, "/models");
  }
}

function applyQwenModelFallback(message = "模型拉取失败，已填入千问常用模型候选。") {
  state.settings.apiModels = QWEN_MODEL_CANDIDATES;
  if (!state.settings.apiModel || !state.settings.apiModels.includes(state.settings.apiModel)) {
    state.settings.apiModel = "qwen-plus";
    els.apiModel.value = state.settings.apiModel;
  }
  renderModelOptions();
  saveState();
  showApiStatus(message, "error");
}

function applyQwenPreset() {
  syncApiFromInputs();
  if (!state.settings.apiUrl || !isQwenUrl(state.settings.apiUrl)) {
    els.apiUrl.value = QWEN_DEFAULT_URL;
    state.settings.apiUrl = els.apiUrl.value;
  }
  state.settings.apiModels = QWEN_MODEL_CANDIDATES;
  if (!state.settings.apiModel) {
    state.settings.apiModel = "qwen-plus";
    els.apiModel.value = state.settings.apiModel;
  }
  renderModelOptions();
  saveState();
  showApiStatus("已切换为千问兼容模式。填写千问 API Key 后可直接拉取模型或检验连接。", "neutral");
}

async function fetchAvailableModels() {
  syncApiFromInputs();
  if (!state.settings.apiUrl || !state.settings.apiKey) {
    showApiStatus("请先填写 API URL 和密钥。", "error");
    return;
  }
  showApiStatus("正在拉取模型...", "neutral");
  try {
    const response = await fetchWithTimeout(getModelsUrl(state.settings.apiUrl), {
      headers: { Authorization: `Bearer ${state.settings.apiKey}` }
    }, getQuickApiTimeout());
    if (!response.ok) await throwApiHttpError(response);
    const data = await response.json();
    const models = (Array.isArray(data.data) ? data.data : [])
      .map((item) => item.id || item.name)
      .filter(Boolean);
    if (!models.length) throw new Error("没有返回模型列表");
    const qwenModels = models.filter((model) => /^qwen/i.test(model));
    state.settings.apiModels = [...new Set([...(qwenModels.length ? qwenModels : models), ...QWEN_MODEL_CANDIDATES])].sort();
    if (!state.settings.apiModel || !state.settings.apiModels.includes(state.settings.apiModel)) {
      state.settings.apiModel = state.settings.apiModels.find((model) => model === "qwen-plus") || state.settings.apiModels[0];
    }
    els.apiModel.value = state.settings.apiModel;
    renderModelOptions();
    saveState();
    showApiStatus(`已拉取 ${state.settings.apiModels.length} 个模型。`, "ok");
  } catch (error) {
    if (isQwenUrl(state.settings.apiUrl)) {
      applyQwenModelFallback("模型拉取失败，已提供千问常用模型候选。请确认地址里的 WorkspaceId 和密钥。");
    } else {
      showApiStatus(`模型拉取失败：${formatGenerationError(error)}`, "error");
    }
  }
}

async function testApiConnection() {

    }, null);

}

function normalizeStory(story, previous, text, variant, fixedEnv) {
  const envFromText = extractEnvFromBlocks(story?.blocks || []);
  const safeEnv = {
    time: fixedEnv?.time || story?.env?.time || envFromText.time || previous.env.time || "傍晚",
    place: fixedEnv?.place || story?.env?.place || envFromText.place || previous.env.place || "未命名的地点",
    weather: fixedEnv?.weather || story?.env?.weather || envFromText.weather || previous.env.weather || "微风"
  };
  const blocks = Array.isArray(story?.blocks) ? story.blocks : [];
  const normalizedBlocks = [];
  blocks.forEach((block) => {
    if (block.type === "dialogue") {
      const rawDialogueText = String(block.text || "");
      if (/[A-Za-z][A-Za-z .'-]{0,30}[：:]\s*[“"「『]|[\u4e00-\u9fa5A-Za-z0-9·]{1,16}[：:]\s*[“"「『]/.test(rawDialogueText)) {
        const mixedDialogue = splitParagraphAndDialogue(rawDialogueText, text, variant);
        mixedDialogue.forEach((item) => normalizedBlocks.push(item));
        return;
      }
      const cleaned = cleanDialogueText(block.text || "");
      if (cleaned.aside) {
        normalizedBlocks.push({
          type: "paragraph",
          text: sanitizeNoPlayerControl(cleaned.aside)
        });
      }
      if (cleaned.line) {
        normalizedBlocks.push({
          type: "dialogue",
          speaker: String(block.speaker || chooseNpc(text, variant).name),
          text: sanitizeNoPlayerControl(cleaned.line)
        });
      }
      return;
    }
    splitParagraphAndDialogue(block.text || "", text, variant).forEach((item) => {
      normalizedBlocks.push(item);
    });
  });
  const filteredBlocks = normalizedBlocks.filter((block) => block.text.trim() && !containsJsonFieldCode(block.text) && !containsJsonFieldCode(block.speaker || ""));

  if (!filteredBlocks.length) {
    throw new Error("API 返回内容为空或格式不符合要求，请调整模型输出格式。");
  }

  return {
    env: safeEnv,
    blocks: filteredBlocks,
    statuses: normalizeStoryStatuses(story?.statuses),
    relations: normalizeStoryRelations(story?.relations),
    memory: cleanMemorySummary(story?.memory || "")
  };
}

function normalizeStoryStatuses(statuses) {
  if (!Array.isArray(statuses)) return [];
  return statuses.map((item) => ({
    name: cleanStatusText(item?.name),
    age: cleanStatusText(item?.age),
    appearance: cleanStatusText(item?.appearance),
    posture: cleanStatusText(item?.posture),
    thought: cleanThoughtText(item?.thought) || cleanStatusText(item?.thought),
    impression: cleanStatusText(item?.impression)
  })).filter((item) => item.name || item.appearance || item.thought);
}

function normalizeStoryRelations(relations) {
  if (!Array.isArray(relations)) return [];
  return relations.map((item) => {
    const affection = Number(item?.affection);
    return {
      name: cleanStatusText(item?.name),
      description: cleanStatusText(item?.description),
      affection: Number.isFinite(affection) ? clamp(affection, -100, 100) : 0
    };
  }).filter((item) => item.name || item.description);
}

function splitParagraphAndDialogue(text, prompt, variant) {
  const raw = stripInlineEnv(String(text || "").replace(/\s*\n+\s*/g, " ").trim());
  if (!raw) return [];
  const pattern = /([A-Za-z][A-Za-z .'-]{0,30}|[\u4e00-\u9fa5A-Za-z0-9·]{1,16})[：:]\s*[“"「『]([^”"」』]+)[”"」』]/g;
  const blocks = [];
  let last = 0;
  let match;
  while ((match = pattern.exec(raw))) {
    const before = raw.slice(last, match.index).trim();
    if (before) {
      blocks.push({ type: "paragraph", text: sanitizeNoPlayerControl(before) });
    }
    blocks.push({
      type: "dialogue",
      speaker: cleanSpeakerName(match[1]) || chooseNpc(prompt, variant).name,
      text: sanitizeNoPlayerControl(match[2].trim())
    });
    last = pattern.lastIndex;
  }
  const rest = raw.slice(last).trim();
  if (rest) {
    blocks.push({ type: "paragraph", text: sanitizeNoPlayerControl(rest) });
  }
  return blocks.length ? blocks : [{ type: "paragraph", text: sanitizeNoPlayerControl(raw) }];
}

function cleanSpeakerName(name) {
  const raw = String(name || "").replace(/[，。！？!?、\s]+$/g, "").trim();
  if (!raw) return "";
  if (/^[A-Za-z][A-Za-z .'-]{1,30}$/.test(raw)) return raw.trim();
  return raw
    .replace(/^.*?(楼下|窗外|门外|身后|旁边|隔壁|远处|走廊尽头)/, "")
    .replace(/^(的|那个|那名|一位|一个)/, "")
    .slice(-10)
    .trim();
}

function extractEnvFromBlocks(blocks) {
  const text = (blocks || []).map((block) => block?.text || "").join(" ");
  return {
    time: text.match(/时间[：:]\s*([^ 地点天气。！？!?，,]+)/)?.[1] || "",
    place: text.match(/地点[：:]\s*([^ 天气。！？!?，,]+)/)?.[1] || "",
    weather: text.match(/天气[：:]\s*([^ 。！？!?，,]+)/)?.[1] || ""
  };
}

function stripInlineEnv(text) {
  return String(text || "")
    .replace(/^\s*时间[：:]\s*[^ 地点天气。！？!?，,]+\s*地点[：:]\s*[^ 天气。！？!?，,]+\s*天气[：:]\s*[^ 。！？!?，,]+\s*/g, "")
    .replace(/^\s*时间[：:]\s*[^。！？!?]*?(?=[\u4e00-\u9fa5A-Za-z])/g, "")
    .trim();
}

function cleanDialogueText(text) {
  let raw = String(text || "").replace(/\s*\n+\s*/g, " ").trim();
  const quoted = raw.match(/[“"「『](.+?)[”"」』]/);
  if (quoted) {
    const line = quoted[1].trim();
    const aside = raw.replace(quoted[0], "").replace(/[（）()]/g, "").trim();
    return { line, aside };
  }
  const parts = raw
    .split(/(?<=[。！？!?])\s*/)
    .map((item) => item.trim())
    .filter(Boolean);
  const actionPattern = /(低头|抬头|皱眉|微笑|转身|走|伸手|握住|看向|望向|沉默|心想|想起|意识到|觉得|感觉|叹了口气|垂下|攥紧|靠近|退后|站起|坐下)/;
  const speechVerbs = /(说|说道|开口|低声|轻声|回答|问|提醒|喊|喃喃|冷声)/;
  const dialogueParts = parts.filter((part) => !actionPattern.test(part) || speechVerbs.test(part));
  const asideParts = parts.filter((part) => actionPattern.test(part) && !speechVerbs.test(part));
  const speechSource = dialogueParts.length ? dialogueParts.join("") : raw;
  const line = speechSource
    .replace(/^(.*?(?:说|说道|开口|低声|轻声|回答|问|提醒|喊|喃喃|冷声)[：:])/, "")
    .replace(/[“”"「」『』]/g, "")
    .trim();
  return {
    line,
    aside: asideParts.filter((part) => !dialogueParts.includes(part)).join("")
  };
}

function sanitizeNoPlayerControl(text) {
  const playerName = getPlayerProfile().name.trim();
  const banned = [
    /你(走|跑|伸手|点头|摇头|回答|说道|决定|选择|拿起|放下|攻击|亲吻|拥抱|转身|离开|进入)/g,
    /你心想/g,
    /你意识到/g
  ];
  let result = String(text).replace(/\s*\n+\s*/g, " ");
  if (playerName) {
    result = result.replaceAll(playerName, "你");
  }
  banned.forEach((pattern) => {
    result = result.replace(pattern, "现场有人$1");
  });
  result = result.replace(/你(走|跑|伸手|点头|摇头|回答|说道|决定|选择|拿起|放下|攻击|亲吻|拥抱|转身|离开|进入)/g, "现场有人$1");
  result = result.replace(/你心想/g, "现场没有替主控写出内心独白");
  result = result.replace(/你意识到/g, "现场线索显示");
  return result.trim();
}

function chooseNpc(text, variant) {
  const savedNpcs = state.settings.npcs.filter((npc) => (npc.name || npc.detail || "").trim());
  const ambientNpcs = [
    { id: "ambient-neighbor", name: "热心邻居", gender: "未知", age: "三十岁上下", detail: "开朗话唠，爱做饭，容易关心刚认识的人。圆脸，面色红润，穿柔软的家居开衫。" },
    { id: "ambient-witness", name: "谨慎旁观者", gender: "未知", age: "二十多岁", detail: "敏锐谨慎，说话前会先观察局势。短发，眼神清亮，深色外套。" },
    { id: "ambient-guard", name: "值夜管理员", gender: "未知", age: "四十岁左右", detail: "谨慎克制，负责秩序，外冷内热，习惯把担心藏在严厉后面。肩背宽，制服整洁，眉间有浅纹。" },
    { id: "ambient-stranger", name: "安静陌生人", gender: "未知", age: "未知", detail: "寡言克制，不轻易靠近别人。身形清瘦，衣领压得很低，动作很轻。" }
  ];
  const npcs = savedNpcs.length ? [...savedNpcs, ...ambientNpcs] : ambientNpcs;
  const npc = npcs[(text.length + variant) % npcs.length];
  return {
    id: npc.id || "default-npc",
    name: npc.name || "陌生人",
    age: npc.age || "未知",
    detail: npc.detail || "轮廓在光线里并不清晰，但注意力始终停在当前事件上。"
  };
}

function getPresentNpcs(event) {
  const speakers = [...new Set((event.story?.blocks || [])
    .filter((block) => block.type === "dialogue" && block.speaker)
    .map((block) => String(block.speaker).trim())
    .filter(Boolean))];
  if (!speakers.length) return [chooseNpc(event.prompt || "", event.variant || 0)];
  return speakers.map((speaker, index) => {
    const saved = state.settings.npcs.find((npc) => npc.name && speaker.includes(npc.name));
    if (saved) return saved;
    const picked = chooseNpc(`${event.prompt || ""}${speaker}`, (event.variant || 0) + index);
    if (/邻居/.test(speaker)) {
      return { ...picked, id: `speaker-${speaker}`, name: speaker, age: "三十岁上下", detail: "开朗话唠，热心，爱做饭，容易把关心藏在闲聊和食物里。面色红润，穿柔软的家居开衫。" };
    }
    if (/路人|旁观/.test(speaker)) {
      return { ...picked, id: `speaker-${speaker}`, name: speaker, age: "未知", detail: "普通路人，心直口快，容易被糟糕环境惹得烦躁。衣着日常，神情不耐。" };
    }
    if (/管理员|保安|守夜/.test(speaker)) {
      return { ...picked, id: `speaker-${speaker}`, name: speaker, age: "四十岁左右", detail: "谨慎克制，负责秩序，外冷内热。肩背宽，制服整洁，眉间有浅纹。" };
    }
    return { ...picked, id: `speaker-${speaker}`, name: speaker };
  });
}

function buildRelationDescription(npc, impression) {
  const profile = parseCharacterProfile(npc, 0);
  if (profile.tone === "talkative") return `刚认识但愿意亲近，对你抱着热络好奇；${impression}`;
  if (profile.tone === "gentle") return `保持温和距离，倾向先照顾你的处境；${impression}`;
  if (profile.tone === "proud") return `互相试探中，不轻易示弱也不轻易信任；${impression}`;
  if (profile.tone === "nervous") return `小心接触中，对你既好奇又不敢完全放松；${impression}`;
  return `保持观察关系，态度会随你的下一步行动变化；${impression}`;
}

function pick(list, seed) {
  return list[Math.abs(seed) % list.length];
}

function rebuildTimeline() {
  const snapshots = [];
  let snap = buildInitialSnapshot();
  state.events.forEach((event) => {
    if (event.type === "player") {
      snap = applyPlayerEvent(snap, event);
    } else if (event.type === "ai") {
      snap = applyAiEvent(snap, event);
    } else if (event.type === "memoryMerge") {
      snap = applyMemoryMergeEvent(snap, event);
    }
    snapshots.push(clone(snap));
  });
  state.snapshots = snapshots;
}

function applyPlayerEvent(snapshot, event) {
  const next = clone(snapshot);
  next.seed += 1;
  compactMemories(next);
  return next;
}

function findApiStatus(statuses, npc) {
  if (!Array.isArray(statuses)) return null;
  return statuses.find((item) => {
    const name = String(item?.name || "").trim();
    return name && (name === npc.name || npc.name.includes(name) || name.includes(npc.name));
  }) || null;
}

function findApiRelation(relations, npc) {
  if (!Array.isArray(relations)) return null;
  return relations.find((item) => {
    const name = String(item?.name || "").trim();
    return name && (name === npc.name || npc.name.includes(name) || name.includes(npc.name));
  }) || null;
}

function cleanStatusText(value) {
  return String(value || "")
    .replace(/\s+/g, " ")
    .replace(/^(姓名|年龄|外形|体位|姿势|内心想法|对“你”印象|对你印象)\s*[:：]\s*/g, "")
    .replace(/(根据|按照|遵循|读取|提炼|结合)设定[^。；;]*[。；;]?/g, "")
    .replace(/(外貌|衣着|性格|状态)随着气氛而变化[。；;]?/g, "")
    .replace(/AI|模型|模板|规则|系统提示|生成逻辑/g, "")
    .trim();
}

function cleanThoughtText(value) {
  const text = cleanStatusText(value);
  if (!text) return "";
  if (/(他觉得|她觉得|此人觉得|他认为|她认为|气氛让|氛围让|剧情让|忍不住想|内心认为|从.*角度|旁白|客观)/.test(text)) return "";
  return text;
}

function sameStatusText(a, b) {
  if (!a || !b) return false;
  return normalizeCompareText(a) === normalizeCompareText(b);
}

function buildStatusField(field, context, offset = 0) {
  const seed = context.seed + offset;
  if (field === "appearance") return buildDynamicAppearance(context.npc, context.env, context.cue, seed);
  if (field === "posture") return describePosture(context.env, seed, context.profile, context.cue);
  if (field === "thought") return buildThought(context.npc, context.cue, context.memories, seed);
  if (field === "impression") return buildImpression(context.npc, context.cue, seed);
  return "";
}

function enforceFreshStatus(status, previous, context) {
  const next = { ...status };
  const fields = ["appearance", "posture", "thought", "impression"];
  fields.forEach((field, index) => {
    const value = field === "thought" ? cleanThoughtText(next[field]) : cleanStatusText(next[field]);
    const invalidThought = field === "thought" && (!value || value.length < 30);
    if (!value || invalidThought || sameStatusText(value, previous?.[field])) {
      next[field] = buildStatusField(field, context, 17 + index * 11);
    } else {
      next[field] = value;
    }
    if (sameStatusText(next[field], previous?.[field])) {
      next[field] = addSceneVariation(next[field], context.cue, context.seed + index);
    }
  });
  next.thought = ensureLongThought(cleanThoughtText(next.thought), next.name);
  if (sameStatusText(next.thought, previous?.thought)) {
    next.thought = ensureLongThought(buildStatusField("thought", context, 71), next.name);
  }
  return next;
}

function addSceneVariation(text, cue, seed) {
  const focus = sceneFocus(cue);
  const tails = [
    `这一刻，注意力明显被${focus}牵住了。`,
    `和上一瞬相比，视线更多停在${focus}上。`,
    `本回合的动静让这份反应比刚才更明显。`
  ];
  return `${String(text || "").replace(/[。；;]*$/g, "")}，${tails[Math.abs(seed) % tails.length]}`;
}

function applyAiEvent(snapshot, event) {
  const next = clone(snapshot);
  if (event.status === "loading" || event.status === "error") {
    return next;
  }
  next.seed += 1;
  next.env = event.story.env;
  const storyText = getStoryPlainText(event.story);
  const cue = buildSceneCue(event.prompt || "", storyText, next.env);
  const speechByNpc = collectDialogueBySpeaker(event.story);
  const previousStatuses = next.statuses || [];
  const currentStatuses = [];
  const npcs = getPresentNpcs(event).map((npc, index) => {
    const existing = previousStatuses.find((person) => person.id === npc.id || person.name === npc.name);
    return { ...npc, detail: npc.detail || existing?.detail || "", existing, offset: index };
  });

  npcs.forEach((npc) => {
    const profile = parseCharacterProfile(npc, (event.variant || 0) + npc.offset);
    const personalCue = [cue, speechByNpc[npc.name] || ""].filter(Boolean).join("，");
    const statusSeed = (event.variant || 0) + npc.offset + next.seed;
    const apiStatus = findApiStatus(event.story.statuses, npc);
    let status = {
      id: npc.id,
      name: npc.name,
      detail: npc.detail || npc.existing?.detail || "",
      age: cleanStatusText(apiStatus?.age) || npc.age || npc.existing?.age || "未知",
      profile,
      appearance: cleanStatusText(apiStatus?.appearance) || buildDynamicAppearance({ ...npc, profile }, event.story.env, personalCue, statusSeed),
      posture: cleanStatusText(apiStatus?.posture) || describePosture(event.story.env, statusSeed, profile, personalCue),
      thought: cleanThoughtText(apiStatus?.thought) || buildThought({ ...npc, profile }, personalCue, next.memories, statusSeed),
      impression: cleanStatusText(apiStatus?.impression) || buildImpression({ ...npc, profile }, personalCue, statusSeed)
    };
    status = enforceFreshStatus(status, npc.existing, {
      npc: { ...npc, profile },
      env: event.story.env,
      cue: personalCue,
      memories: next.memories,
      seed: statusSeed,
      profile
    });
    currentStatuses.push(status);

    const relation = next.relations.find((item) => item.id === npc.id || item.name === npc.name);
    const apiRelation = findApiRelation(event.story.relations, npc);
    const apiRelationDescription = cleanStatusText(apiRelation?.description);
    const apiAffection = Number(apiRelation?.affection);
    const delta = event.source === "directive" ? 1 : Math.max(1, Math.min(6, (event.prompt || "").length % 7));
    if (relation) {
      relation.affection = Number.isFinite(apiAffection)
        ? clamp(apiAffection, -100, 100)
        : clamp(Number(relation.affection || 0) + delta - (event.variant ? 1 : 0), -100, 100);
      relation.description = apiRelationDescription || buildRelationDescription(npc, status.impression);
    } else {
      next.relations.push({
        id: npc.id,
        name: npc.name,
        description: apiRelationDescription || buildRelationDescription(npc, status.impression),
        affection: Number.isFinite(apiAffection) ? clamp(apiAffection, -100, 100) : delta
      });
    }
  });
  next.statuses = currentStatuses;
  next.memories.instant.push({
    id: `mem-${event.id}`,
    sourceEventId: event.id,
    text: cleanMemorySummary(event.story.memory) || summarizeRoundMemory(event, storyText, npcs)
  });
  compactMemories(next);
  return next;
}

function applyMemoryMergeEvent(snapshot, event) {
  const next = clone(snapshot);
  const ids = new Set(event.memoryIds);
  const selected = [
    ...next.memories.instant.map((memory) => ({ ...memory, type: "instant" })),
    ...next.memories.long.map((memory) => ({ ...memory, type: "long" }))
  ].filter((memory) => ids.has(memory.id));
  if (!selected.length) return next;

  next.memories.instant = next.memories.instant.filter((memory) => !ids.has(memory.id));
  next.memories.long = next.memories.long.filter((memory) => !ids.has(memory.id));
  next.memories.long.push({
    id: event.id,
    sourceEventId: selected.at(-1).sourceEventId,
    text: event.text
  });
  return next;
}

function cleanMemorySummary(value) {
  const clean = String(value || "")
    .replace(/\s+/g, " ")
    .replace(/[“”"「」『』].*?[“”"「」『』]/g, "这段对话")
    .replace(/(你|主控|玩家)\s*(说|问|回复|表示)\s*[:：][^；。]+[；。]?/g, "你进行了交流。")
    .replace(/[^，。；]*?(?:说|说道|问道|回答|回复)\s*[:：][^；。]+[；。]?/g, "")
    .replace(/(?:本回合|即时记忆|总结)\s*[:：]\s*/g, "")
    .replace(/[；;]\s*[；;]+/g, "；")
    .trim();
  if (!clean) return "";
  const sentence = clean.split(/[。！？]/).find((part) => part.trim()) || clean;
  const oneLine = sentence.replace(/[；;]$/g, "").trim();
  return oneLine.length > 96 ? `${oneLine.slice(0, 96)}…` : oneLine;
}

function summarizeRoundMemory(event, storyText, npcs) {
  const action = compactText(normalizePlayerActionForMemory(event.prompt || "剧情发展指令"), 42);
  const story = compactText(stripDialogueForMemory(storyText), 58);
  const npcNames = [...new Set((npcs || []).map((npc) => npc.name).filter(Boolean))].slice(0, 3).join("、") || "现场人物";
  const reaction = compactText(extractReactionSummary(event.story) || "现场人物根据本回合剧情调整了态度与行动。", 44);
  return cleanMemorySummary(`你${action}，剧情核心是${story}，${npcNames}的关键反应是${reaction}`);
}

function stripDialogueForMemory(text) {
  return String(text || "")
    .replace(/[“”"「」『』].*?[“”"「」『』]/g, "")
    .replace(/[\u4e00-\u9fa5A-Za-z0-9·]{1,16}[：:][^。；!?！？]+/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function extractReactionSummary(story) {
  const speakers = [...new Set((story?.blocks || [])
    .filter((block) => block.type === "dialogue" && block.speaker)
    .map((block) => block.speaker))];
  const paragraphs = (story?.blocks || [])
    .filter((block) => block.type !== "dialogue" && block.text)
    .map((block) => stripDialogueForMemory(block.text))
    .filter(Boolean);
  const action = paragraphs.at(-1) || paragraphs[0] || "";
  return [speakers.length ? `${speakers.slice(0, 2).join("、")}参与回应` : "", action].filter(Boolean).join("，");
}

function compactMemories(snapshot) {
  while (snapshot.memories.instant.length >= 10) {
    const batch = snapshot.memories.instant.splice(0, 10);
    snapshot.memories.long.push({
      id: `long-auto-${batch.map((item) => item.sourceEventId).join("-")}`,
      sourceEventId: batch.at(-1).sourceEventId,
      text: summarizeMemoryBatch(batch, "长期记忆")
    });
  }
}

function summarizeMemoryBatch(memories, prefix = "长期记忆") {
  const text = memories.map((item) => item.text || "").join(" ");
  const people = extractMemoryPeople(text);
  const actionParts = [];
  const plotParts = [];
  const reactionParts = [];
  memories.forEach((item) => {
    const line = String(item.text || "");
    const action = line.match(/本回合你(.+?)(?:；|$)/)?.[1];
    const plot = line.match(/剧情推进为(.+?)(?:；|$)/)?.[1];
    const reaction = line.match(/的反应是(.+)$/)?.[1];
    if (action) actionParts.push(action);
    if (plot) plotParts.push(plot);
    if (reaction) reactionParts.push(reaction);
  });
  const actionCore = compactText(dedupeTextParts(actionParts).join("，"), 56);
  const plotCore = compactText(dedupeTextParts(plotParts).join("，"), 76);
  const reactionCore = compactText(dedupeTextParts(reactionParts).join("，"), 64);
  const peopleText = people.length ? `涉及${people.join("、")}，` : "";
  const core = [
    actionCore ? `你的关键行动为${actionCore}` : "",
    plotCore ? `剧情核心变化是${plotCore}` : "",
    reactionCore ? `人物反应集中在${reactionCore}` : ""
  ].filter(Boolean).join("；");
  return `${prefix}：${peopleText}${core || compactText(text.replace(/[；;]/g, "，"), 160)}`;
}

function normalizePlayerActionForMemory(text) {
  const clean = String(text || "")
    .replace(/\s+/g, " ")
    .replace(/^我(?=[要想在把拿走看问说打开进入离开寻找观察检查靠近推拉敲听])/g, "")
    .replace(/^我/g, "")
    .replace(/。$/g, "")
    .trim();
  if (!clean) return "推动了本回合行动";
  if (/^(要|想|在|把|拿|走|看|问|说|打开|进入|离开|寻找|观察|检查|靠近|推|拉|敲|听)/.test(clean)) return clean;
  return `进行了“${clean}”`;
}

function extractMemoryPeople(text) {
  const blacklist = /本回合|剧情|推进|现场|人物|反应|长期记忆|即时记忆|整合记忆|主控|关系|记忆|关键行动|核心变化|集中/;
  return [...new Set((String(text || "").match(/[A-Za-z][A-Za-z .'-]{1,30}|[\u4e00-\u9fa5]{2,6}/g) || [])
    .filter((name) => !blacklist.test(name)))].slice(0, 4);
}

function dedupeTextParts(parts) {
  const seen = new Set();
  return parts
    .map((part) => String(part || "").replace(/\s+/g, " ").trim())
    .filter((part) => {
      if (!part) return false;
      const key = normalizeCompareText(part).slice(0, 36);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

function compactText(text, limit) {
  const clean = String(text || "")
    .replace(/\s+/g, " ")
    .replace(/时间：[^ 地点天气]+ 地点：[^ 天气]+ 天气：[^ ]+/g, "")
    .trim();
  return clean.length > limit ? `${clean.slice(0, limit)}…` : clean;
}

function extractDialogueSummary(story) {
  const dialogues = (story?.blocks || [])
    .filter((block) => block.type === "dialogue" && block.speaker && block.text)
    .map((block) => `${block.speaker}说“${block.text}”`);
  return dialogues.join("；");
}

function describePosture(env, variant, profile = {}, cue = "") {

    gentle: [

      `一手垂在身侧，另一只手压着衣角，像是不愿让情绪先露出来。`
    ],
    nervous: [
      `贴着${place}边缘站着，手指不自觉收紧，又忍不住看向你。`,
      `半步退在阴影旁，肩膀略缩，视线在你和周围动静之间来回移动。`,
      `脚步停得很轻，像怕惊动什么，呼吸也跟着放慢了。`
    ],
    careful: [
      `停在能看清你和${place}动静的位置，身体没有贸然靠近。`,

function describeResponsivePosture(person, prompt, env, seed) {
  const profile = person.profile || parseCharacterProfile(person, seed);
  return describePosture(env, seed, profile, prompt);
}

function buildDynamicAppearance(npc, env, cue, variant) {
  const profile = npc.profile || parseCharacterProfile(npc, variant);
  const emotion = inferSceneEmotion(cue);
  const expression = {
    warm: ["眼里浮着笑意", "唇角压不住一点热络", "面色红润，神情很亮"],
    tense: ["眉心轻轻蹙起", "唇线收紧，脸色比刚才淡了些", "眼神绷着一层警惕"],
    curious: ["目光亮了一下", "眼尾带着明显的好奇", "神情像被什么细节勾住"],
    guarded: ["视线克制地停了一瞬", "表情收得很稳", "神色没有完全放松"]
  }[emotion];
  const base = [
    profile.hair,
    profile.skin,
    profile.face,
    profile.clothes,
    pick(expression, variant + cue.length),
    sceneOuterDetail(cue, variant)
  ].filter(Boolean);
  return base.slice(0, 5).join("，") + "。";
}

function sceneOuterDetail(cue, variant) {
  const text = String(cue || "");
  const details = [];
  if (/牛肉|饭|汤|厨房|吃/.test(text)) details.push("袖口和发梢像是还沾着一点厨房热气");
  if (/门|锁|钥匙|防盗/.test(text)) details.push("目光总会往门锁和门缝那边偏一下");
  if (/走廊|楼道|门口/.test(text)) details.push("身侧被走廊冷白的光勾出一圈浅边");
  if (/雨|风|冷|夜/.test(text)) details.push("衣料边缘带着夜风压出的细小褶皱");
  if (/笑|高兴|邀请|聊天/.test(text)) details.push("眉眼比刚才松开些，神色显得更亲近");
  if (/危险|血|黑|怕|紧张|异常/.test(text)) details.push("脸色被当前动静压得更紧，眼神多了戒备");
  if (!details.length) details.push("神情正被本回合的动静牵动着，细节比上一刻更鲜明");
  return details[Math.abs(variant) % details.length];
}

function extractAppearanceTraits(detail) {
  const text = String(detail || "");
  const hairMatch = text.match(/[^，。；、\s]{0,8}(?:黑|白|银|金|棕|褐|灰|红|粉|蓝|紫|栗|茶)[^，。；、\s]{0,8}(?:发|头发|卷发|卷毛|长发|短发|马尾|刘海)/);
  const skinMatch = text.match(/(?:白皮肤|白皙|冷白皮|小麦肤|肤色[^，。；、\s]{0,8}|皮肤[^，。；、\s]{0,8})/);
  const faceMatch = text.match(/(?:高鼻梁|鼻梁[^，。；、\s]{0,8}|眼睛[^，。；、\s]{0,8}|眉眼[^，。；、\s]{0,8}|眉间[^，。；、\s]{0,8}|薄唇|唇色[^，。；、\s]{0,8}|圆脸|脸[^，。；、\s]{0,8}|轮廓[^，。；、\s]{0,8}|肩背[^，。；、\s]{0,8})/);
  const clothesMatch = text.match(/(?:穿着|身穿|衣着|制服|家居开衫|开衫|长裙|衬衫|外套|风衣|披肩|靴子|手套)[^，。；、\s]{0,14}/);
  return {
    hair: hairMatch?.[0] || "",
    skin: skinMatch?.[0] || "",
    face: faceMatch?.[0] || "",
    clothes: clothesMatch?.[0] || ""
  };
}

function buildThought(person, cue, memories, variant) {
  const name = typeof person === "string" ? person : person.name;

  const focus = sceneFocus(cue);

  const hooks = {
    talkative: [
      `我是不是该过去搭句话？${focus}听起来怪让人在意的，拿点热汤或者点心当借口应该不算突兀吧。可万一她不喜欢陌生人主动靠近呢？我别一开口就说个没完，先轻一点试试。`,
      `刚搬来的邻居大晚上遇上这种动静，心里肯定也不踏实吧。我要不要把吃的分一点过去？不行不行，别太热情把人吓到，先找个自然的话头，看她愿不愿意接。`
    ],
    gentle: [
      `我不能靠得太近，别让她觉得被逼着回应。${focus}已经够让人紧张了，我先把声音放轻一点，给她留出退路。要是她愿意听，我再提醒她小心。`,
      `她现在未必需要我插手，可我也不能装作没看见。先确认周围安不安全，再用不冒犯的方式开口，别把好意变成压力。`
    ],
    proud: [
      `我不能表现得太在意，尤其是${focus}这种事，一急就显得我先乱了。她看起来也不迟钝，随便试探反而会露怯。先稳住，话要说得像我本来就掌握局面。`,
      `她这一出现倒是把局面搅动了。我要先看她下一步怎么做，再决定是顺势开口，还是把疑问压回去。别急，急了就不好看了。`
    ],
    nervous: [
      `刚才${focus}，我总觉得哪里不太对。她不像故意找麻烦的人，可我也不能完全放心。我要不要开口？万一说错话更尴尬怎么办，还是先别靠太近。`,
      `怎么连一点声响都变得这么明显……我是不是该提醒她小心？可我自己都慌成这样，别一开口反而把事情弄得更糟。`
    ],
    irritable: [
      `烦死了，偏偏这种时候又碰上新邻居。她看起来不像故意添乱，可${focus}全搅在一起，谁心情能好？要不要提醒她一句？算了，别一上来就像找茬。`,
      `我本来只想快点绕过这摊麻烦，现在又多了个新面孔。她倒不像难相处的人，可要是继续耗在这里，今晚肯定没完。先随口抱怨一句，看看她接不接话。`
    ],
    careful: [
      `先别急着下结论。${focus}都得记住，她现在没有乱来，这点也要算进去。等线索和之前的事对上，我再决定要不要多说一点。`,
      `不能只看表面，她没有立刻越界，这一点值得记下。可信任不能给得太快，我得再看她接下来是不是前后一致。`
    ]
  };
  const list = hooks[profile.tone] || hooks.careful;
  const thought = list[Math.abs(variant + focus.length) % list.length];
  const memory = memoryHint && memoryHint !== "刚才的变化" ? ` 还有${memoryHint}这件事，我不能完全当没发生过。` : "";
  return `${thought}${memory}`;
}

function buildImpression(person, cue, variant) {
  const profile = typeof person === "string" ? parseCharacterProfile({ name: person }, variant) : (person.profile || parseCharacterProfile(person, variant));
  const focus = sceneFocus(cue);
  const impressions = {
    talkative: [

    ],

  const list = impressions[profile.tone] || impressions.careful;
  return list[Math.abs(variant + focus.length) % list.length];
